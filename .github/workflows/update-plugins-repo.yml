name: Update Plugins Repo

# When a tracked plugin repo publishes a new stable release, this workflow:
#   1. Downloads and extracts the release ZIP
#   2. Runs CodeQL (security-extended) on the plugin source
#   3. Opens or updates a PR against the community Plugins repo (vars.PLUGINS_REPO)
#      from a branch in the sethwv/Plugins fork named auto/bump/SLUG-VERSION

on:
  repository_dispatch:
    types: [plugin-updated]
  workflow_dispatch:
    inputs:
      repo:
        description: 'Source repo (owner/repo, must be in repos.json)'
        required: true

concurrency:
  group: update-plugins-repo-${{ github.event.client_payload.repo || inputs.repo }}
  cancel-in-progress: true

jobs:
  update-plugin:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    env:
      GH_TOKEN: ${{ secrets.SETH_PAT }}
      PLUGINS_REPO: ${{ vars.PLUGINS_REPO }}

    steps:
      - name: Checkout aggregator repo
        uses: actions/checkout@v4

      - name: Resolve source repo
        id: source
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REPO="${{ github.event.client_payload.repo }}"
          else
            REPO="${{ inputs.repo }}"
          fi

          if [ -z "$REPO" ]; then
            echo "::error::No source repo provided."
            exit 1
          fi

          echo "repo=$REPO" >> "$GITHUB_OUTPUT"

      - name: Validate repo is tracked and extract config
        id: config
        env:
          REPO: ${{ steps.source.outputs.repo }}
        run: |
          ENTRY=$(jq -r --arg repo "$REPO" '.[] | select(.repo == $repo)' repos.json)
          if [ -z "$ENTRY" ]; then
            echo "::warning::Repo '$REPO' is not tracked in repos.json. Skipping."
            exit 0
          fi

          PLUGIN_JSON_PATH=$(echo "$ENTRY" | jq -r '.plugin_json')
          # Derive slug from plugin.json name field:
          #   "Embyfin Stream Cleanup" -> embyfin-stream-cleanup
          PLUGIN_JSON=$(gh api "repos/$REPO/contents/$PLUGIN_JSON_PATH" --jq '.content' | base64 -d)
          PLUGIN_NAME=$(echo "$PLUGIN_JSON" | jq -r '.name')
          SLUG=$(echo "$PLUGIN_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-')

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Get latest stable release
        id: release
        if: steps.config.outputs.slug != ''
        env:
          REPO: ${{ steps.source.outputs.repo }}
        run: |
          RELEASE=$(gh api "repos/$REPO/releases/latest" 2>/dev/null || true)
          if [ -z "$RELEASE" ] || echo "$RELEASE" | jq -e '.message == "Not Found"' > /dev/null 2>&1; then
            echo "::warning::No stable release found for '$REPO'. Skipping."
            exit 0
          fi

          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          VERSION=$(echo "$TAG" | sed 's/^v//')
          RELEASE_URL=$(echo "$RELEASE" | jq -r '.html_url')

          echo "tag=$TAG"               >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"

      - name: Get current version in Plugins repo
        id: current
        if: steps.release.outputs.tag != ''
        env:
          SLUG: ${{ steps.config.outputs.slug }}
        run: |
          if ! RESPONSE=$(gh api "repos/$PLUGINS_REPO/contents/plugins/$SLUG/plugin.json" 2>/dev/null); then
            echo "current_version=0.0.0" >> "$GITHUB_OUTPUT"
            echo "is_new_plugin=true"    >> "$GITHUB_OUTPUT"
          else
            CURRENT=$(echo "$RESPONSE" | jq -r '.content' | base64 -d | jq -r '.version')
            echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "is_new_plugin=false"       >> "$GITHUB_OUTPUT"
          fi

      - name: Check if update is needed
        id: check
        if: steps.release.outputs.tag != ''
        env:
          NEW_VERSION: ${{ steps.release.outputs.version }}
          CURRENT_VERSION: ${{ steps.current.outputs.current_version }}
          SLUG: ${{ steps.config.outputs.slug }}
        run: |
          echo "Current version in Plugins repo : $CURRENT_VERSION"
          echo "Latest stable release            : $NEW_VERSION"

          if [ "$NEW_VERSION" = "$CURRENT_VERSION" ]; then
            echo "::notice::Plugin '$SLUG' is already at v$NEW_VERSION in Plugins repo. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for an existing open PR for this slug — capture number and head branch
          OPEN_PR_JSON=$(gh pr list \
            --repo "$PLUGINS_REPO" \
            --state open \
            --search "is:open is:pr [${SLUG}] in:title" \
            --json number,headRefName \
            --jq '.[0] // empty')

          if [ -n "$OPEN_PR_JSON" ]; then
            OPEN_PR=$(echo "$OPEN_PR_JSON" | jq -r '.number')
            OPEN_PR_BRANCH=$(echo "$OPEN_PR_JSON" | jq -r '.headRefName')
            echo "::notice::Open PR #$OPEN_PR already exists for '$SLUG'. Will update."
            echo "existing_pr=$OPEN_PR"               >> "$GITHUB_OUTPUT"
            echo "existing_pr_branch=$OPEN_PR_BRANCH" >> "$GITHUB_OUTPUT"
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Download and extract release ZIP
        id: extract
        if: steps.check.outputs.skip == 'false'
        env:
          REPO: ${{ steps.source.outputs.repo }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          mkdir -p /tmp/download /tmp/extract

          gh release download "$TAG" -R "$REPO" -p '*.zip' -D /tmp/download

          ZIP_FILE=$(ls /tmp/download/*.zip 2>/dev/null | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "::error::No .zip asset found in release $TAG of $REPO."
            exit 1
          fi

          unzip -q "$ZIP_FILE" -d /tmp/extract

          # Locate the plugin.json inside the ZIP (handles any internal dir name)
          PLUGIN_JSON=$(find /tmp/extract -name plugin.json -maxdepth 2 | head -1)
          if [ -z "$PLUGIN_JSON" ]; then
            echo "::error::No plugin.json found inside release ZIP."
            exit 1
          fi

          CONTENT_DIR=$(dirname "$PLUGIN_JSON")
          echo "content_dir=$CONTENT_DIR" >> "$GITHUB_OUTPUT"

      - name: Stage plugin source for CodeQL
        if: steps.check.outputs.skip == 'false'
        env:
          CONTENT_DIR: ${{ steps.extract.outputs.content_dir }}
        run: |
          rm -rf plugin-source
          mkdir -p plugin-source
          cp -r "$CONTENT_DIR"/. plugin-source/

      - name: Initialize CodeQL
        if: steps.check.outputs.skip == 'false'
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended
          config: |
            paths:
              - plugin-source

      - name: Analyze with CodeQL
        id: codeql_analyze
        if: steps.check.outputs.skip == 'false'
        uses: github/codeql-action/analyze@v3
        with:
          output: /tmp/codeql-results
          upload: never

      - name: Check CodeQL results
        id: codeql_check
        if: steps.check.outputs.skip == 'false'
        env:
          SLUG: ${{ steps.config.outputs.slug }}
        run: |
          SARIF=$(ls /tmp/codeql-results/*.sarif 2>/dev/null | head -1)
          if [ -z "$SARIF" ]; then
            echo "::warning::No CodeQL SARIF output found — treating as passed."
            echo "codeql_passed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RESULTS=$(jq '[.runs[].results // [] | .[]] | length' "$SARIF")
          echo "CodeQL security-extended results for '$SLUG': $RESULTS issue(s)"

          if [ "$RESULTS" -gt 0 ]; then
            echo "::error::CodeQL found $RESULTS security issue(s) in '$SLUG'. Skipping PR."
            jq -r '.runs[].results[] | "  - \(.ruleId): \(.message.text) (\(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine))"' "$SARIF" || true
            echo "codeql_passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::CodeQL passed — no security-extended issues found."
            echo "codeql_passed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        id: notes
        if: steps.check.outputs.skip == 'false' && steps.codeql_check.outputs.codeql_passed == 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
        run: |
          mkdir -p /tmp/release-notes
          printf 'See the full changelog at %s\n' "$RELEASE_URL" > /tmp/release-notes/HIGHLIGHTS.md
          printf 'Update to v%s\n\nSee release notes: %s\n' "$VERSION" "$RELEASE_URL" > /tmp/release-notes/PR.md

      - name: Fork and clone Plugins repo
        id: fork
        if: steps.check.outputs.skip == 'false' && steps.codeql_check.outputs.codeql_passed == 'true'
        env:
          SLUG: ${{ steps.config.outputs.slug }}
          VERSION: ${{ steps.release.outputs.version }}
          EXISTING_PR_BRANCH: ${{ steps.check.outputs.existing_pr_branch }}
        run: |
          # Reuse the existing PR's head branch when updating; otherwise create a new one
          if [ -n "$EXISTING_PR_BRANCH" ]; then
            BRANCH="$EXISTING_PR_BRANCH"
          else
            BRANCH="auto/bump/${SLUG}-${VERSION}"
          fi

          # Fork is idempotent - reuses existing fork
          # --clone also sets up the upstream remote automatically
          gh repo fork "$PLUGINS_REPO" --clone

          FORK_OWNER=$(gh api user --jq '.login')
          PLUGINS_REPO_NAME=$(echo "$PLUGINS_REPO" | cut -d'/' -f2)

          cd "$PLUGINS_REPO_NAME"

          git fetch upstream
          git checkout -B "$BRANCH" upstream/main

          echo "branch=$BRANCH"              >> "$GITHUB_OUTPUT"
          echo "fork_owner=$FORK_OWNER"      >> "$GITHUB_OUTPUT"
          echo "repo_dir=$PLUGINS_REPO_NAME" >> "$GITHUB_OUTPUT"

      - name: Update plugin directory
        if: steps.check.outputs.skip == 'false' && steps.codeql_check.outputs.codeql_passed == 'true'
        env:
          SLUG: ${{ steps.config.outputs.slug }}
          CONTENT_DIR: ${{ steps.extract.outputs.content_dir }}
        run: |
          cd "${{ steps.fork.outputs.repo_dir }}"

          rm -rf "plugins/$SLUG"
          mkdir -p "plugins/$SLUG"
          cp -r "$CONTENT_DIR"/. "plugins/$SLUG/"

          git add "plugins/$SLUG"

      - name: Commit and push
        if: steps.check.outputs.skip == 'false' && steps.codeql_check.outputs.codeql_passed == 'true'
        env:
          SLUG: ${{ steps.config.outputs.slug }}
          VERSION: ${{ steps.release.outputs.version }}
          BRANCH: ${{ steps.fork.outputs.branch }}
          FORK_OWNER: ${{ steps.fork.outputs.fork_owner }}
        run: |
          cd "${{ steps.fork.outputs.repo_dir }}"

          git config user.name  "sethwv"
          git config user.email "sethwv@users.noreply.github.com"

          PR_TITLE=$(head -1 /tmp/release-notes/PR.md)
          # Lines 3+ as commit body (skip blank line 2)
          PR_BODY=$(tail -n +3 /tmp/release-notes/PR.md)

          COMMIT_MSG="[${SLUG}] ${PR_TITLE}"

          git commit -m "$COMMIT_MSG" -m "$PR_BODY"

          # Push to fork using PAT for attribution
          PLUGINS_REPO_NAME=$(echo "$PLUGINS_REPO" | cut -d'/' -f2)
          git remote set-url origin "https://x-access-token:${{ secrets.SETH_PAT }}@github.com/${FORK_OWNER}/${PLUGINS_REPO_NAME}.git"
          git push -f origin "$BRANCH"

      - name: Create or update pull request
        id: pr
        if: steps.check.outputs.skip == 'false' && steps.codeql_check.outputs.codeql_passed == 'true'
        env:
          SLUG: ${{ steps.config.outputs.slug }}
          VERSION: ${{ steps.release.outputs.version }}
          BRANCH: ${{ steps.fork.outputs.branch }}
          FORK_OWNER: ${{ steps.fork.outputs.fork_owner }}
          IS_NEW_PLUGIN: ${{ steps.current.outputs.is_new_plugin }}
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
          EXISTING_PR: ${{ steps.check.outputs.existing_pr }}
        run: |
          PR_TITLE=$(head -1 /tmp/release-notes/PR.md)
          HIGHLIGHTS=$(cat /tmp/release-notes/HIGHLIGHTS.md)

          FULL_PR_TITLE="[${SLUG}] ${PR_TITLE}"

          if [ "$IS_NEW_PLUGIN" = "true" ]; then
            CHECKLIST="**If this is a new plugin:**
          - [x] Plugin folder is named \`lowercase-kebab-case\`
          - [x] \`plugin.json\` contains all required fields
          - [x] My GitHub username is in \`author\` or \`maintainers\`
          - [x] \`license\` is a valid OSI-approved SPDX identifier
          - [x] I have tested the plugin against a running Dispatcharr instance"
          else
            CHECKLIST="**If this is an update to an existing plugin:**
          - [x] \`version\` in \`plugin.json\` is incremented
          - [x] I am listed in \`author\` or \`maintainers\` of the existing plugin"
          fi

          PR_BODY="## About this submission

          ${HIGHLIGHTS}

          **Release**: [v${VERSION}](${RELEASE_URL})

          ## Pre-submission checklist

          ${CHECKLIST}"

          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" \
              --repo "$PLUGINS_REPO" \
              --title "$FULL_PR_TITLE" \
              --body "$PR_BODY"
            PR_URL=$(gh pr view "$EXISTING_PR" --repo "$PLUGINS_REPO" --json url --jq '.url')
            echo "pr_action=updated" >> "$GITHUB_OUTPUT"
          else
            PR_URL=$(gh pr create \
              --repo "$PLUGINS_REPO" \
              --base main \
              --head "${FORK_OWNER}:${BRANCH}" \
              --title "$FULL_PR_TITLE" \
              --body "$PR_BODY")
            echo "pr_action=created" >> "$GITHUB_OUTPUT"
          fi

          echo "pr_url=$PR_URL"          >> "$GITHUB_OUTPUT"
          echo "pr_title=$FULL_PR_TITLE" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        if: always()
        env:
          SLUG: ${{ steps.config.outputs.slug }}
          VERSION: ${{ steps.release.outputs.version }}
          CURRENT_VERSION: ${{ steps.current.outputs.current_version }}
          IS_NEW_PLUGIN: ${{ steps.current.outputs.is_new_plugin }}
          BRANCH: ${{ steps.fork.outputs.branch }}
          FORK_OWNER: ${{ steps.fork.outputs.fork_owner }}
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          PR_TITLE: ${{ steps.pr.outputs.pr_title }}
          PR_ACTION: ${{ steps.pr.outputs.pr_action }}
          SKIP: ${{ steps.check.outputs.skip }}
          CODEQL_PASSED: ${{ steps.codeql_check.outputs.codeql_passed }}
          SOURCE_REPO: ${{ steps.source.outputs.repo }}
        run: |
          {
            if [ -n "$PR_URL" ]; then
              if [ "$PR_ACTION" = "updated" ]; then
                echo "## Plugin PR Updated"
              else
                echo "## Plugin PR Created"
              fi
              echo ""
              echo "| | |"
              echo "|---|---|"
              echo "| **PR** | [$PR_TITLE]($PR_URL) |"
              echo "| **Plugin** | \`$SLUG\` |"
              echo "| **Version** | \`$CURRENT_VERSION\` → \`$VERSION\` |"
              if [ "$IS_NEW_PLUGIN" = "true" ]; then
                echo "| **Type** | New plugin |"
              else
                echo "| **Type** | Update |"
              fi
              echo "| **Branch** | \`${FORK_OWNER}:${BRANCH}\` |"
              echo "| **Source release** | [v${VERSION}]($RELEASE_URL) |"
              if [ -f /tmp/release-notes/PR.md ]; then
                echo ""
                echo "### Commit message"
                echo "\`\`\`"
                cat /tmp/release-notes/PR.md
                echo "\`\`\`"
              fi
            elif [ "$CODEQL_PASSED" = "false" ]; then
              echo "## Blocked by CodeQL"
              echo ""
              echo "CodeQL (security-extended) found issues in \`$SLUG\` v${VERSION}. PR not created."
              echo "Review the \`Check CodeQL results\` step logs for details."
            elif [ "$SKIP" = "true" ]; then
              echo "## Skipped"
              echo ""
              echo "No update needed for \`$SLUG\` — already at v${VERSION} in Plugins repo."
            elif [ -z "$SLUG" ]; then
              echo "## Skipped"
              echo ""
              echo "Repo \`$SOURCE_REPO\` is not tracked in \`repos.json\`."
            else
              echo "## Failed"
              echo ""
              echo "Workflow did not complete successfully for \`$SLUG\` v${VERSION}. Check the step logs above."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

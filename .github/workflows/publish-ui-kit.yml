name: Publish UI Kit

# Version bumps happen by hand in ui-kit/package.json (ordinary commit, no
# workflow-side git commit). This workflow just detects whether that
# version has already been tagged/published and, if not, builds, tags, and
# publishes it.

on:
  push:
    branches: [main]
    paths:
      - 'ui-kit/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-ui-kit
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version against existing tags
        id: check
        working-directory: ui-kit
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if git rev-parse "ui-kit-$VERSION" >/dev/null 2>&1; then
            echo "::notice::ui-kit-$VERSION is already tagged. Skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui-kit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@swvn-dispatch'

      - run: npm install

      # Validate BEFORE tagging/publishing — a failed build here stops the
      # workflow with no tag, no publish.
      - run: npm run build

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "ui-kit-${{ needs.check-version.outputs.version }}"
          git push origin "ui-kit-${{ needs.check-version.outputs.version }}"

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.SETH_PAT }}
